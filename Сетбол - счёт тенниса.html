document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ard:#ffffff;\n    --line:#e3e0d4;\n    --court:#2f7d4f;\n    --court-deep:#1f5b39;\n    --ball:#d6f24b;\n    --ball-deep:#b9d92f;\n    --p1:#2563c9;\n    --p1-soft:#e7eefb;\n    --p2:#e0632b;\n    --p2-soft:#fceee6;\n    --danger:#c0392b;\n    --shadow:0 1px 2px rgba(22,36,27,.06), 0 8px 24px rgba(22,36,27,.06);\n  }\n  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}\n  html,body{height:100%}\n  body{\n    font-family:'Archivo',system-ui,sans-serif;\n    background:#cdcabd;\n    color:var(--ink);\n    display:flex;justify-content:center;align-items:stretch;\n    overscroll-behavior:none;\n  }\n  #app{width:100%;max-width:430px;min-height:100vh;background:var(--paper);\n    display:flex;flex-direction:column;position:relative;overflow:hidden;\n    box-shadow:0 0 60px rgba(0,0,0,.18)}\n  .expanded{font-family:'Archivo Expanded','Archivo',sans-serif}\n  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}\n  .tnum{font-variant-numeric:tabular-nums}\n\n  /* ===== scroll area ===== */\n  .screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px 120px}\n  .screen::-webkit-scrollbar{display:none}\n\n  /* ===== top bar ===== */\n  .topbar{padding:26px 18px 14px;display:flex;align-items:flex-end;justify-content:space-between}\n  .brand{display:flex;align-items:center;gap:10px}\n  .brand .ball{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#e9ff6b,var(--ball) 55%,var(--ball-deep));\n    position:relative;flex:none;box-shadow:inset 0 -3px 6px rgba(0,0,0,.12)}\n  .brand .ball::before,.brand .ball::after{content:\"\";position:absolute;inset:0;border-radius:50%;\n    border:1.5px solid rgba(255,255,255,.85)}\n  .brand .ball::before{clip-path:inset(0 50% 0 0);transform:scaleX(.42);left:-1px}\n  .brand .ball::after{clip-path:inset(0 0 0 50%);transform:scaleX(.42);right:-1px}\n  .brand h1{font-size:19px;font-weight:800;letter-spacing:-.4px}\n  .brand h1 span{color:var(--court);display:block;font-size:10.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink-soft)}\n\n  /* ===== cards / sections ===== */\n  .sec-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin:22px 4px 11px;display:flex;align-items:center;gap:8px}\n  .sec-label::after{content:\"\";flex:1;height:1px;background:var(--line)}\n  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}\n\n  /* ===== player picker ===== */\n  .vs-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:stretch}\n  .pick{padding:20px 14px;text-align:center;position:relative}\n  .pick .role{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}\n  .pick.p1 .role{color:var(--p1)}\n  .pick.p2 .role{color:var(--p2)}\n  .avatar{width:60px;height:60px;border-radius:50%;margin:0 auto 11px;display:flex;align-items:center;justify-content:center;\n    font-size:23px;font-weight:800;color:#fff}\n  .pick.p1 .avatar{background:var(--p1)}\n  .pick.p2 .avatar{background:var(--p2)}\n  .avatar.empty{background:var(--line);color:var(--ink-soft);font-size:26px}\n  .pick .pname{font-size:15px;font-weight:700;line-height:1.15;min-height:18px}\n  .pick .pname.ph{color:var(--ink-soft);font-weight:500}\n  .pick .chev{font-size:11px;color:var(--ink-soft);margin-top:5px}\n  .vs-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;\n    font-weight:900;color:var(--court);font-size:16px;padding:0 4px;position:relative}\n  .vs-badge::before{content:\"\";position:absolute;top:18px;bottom:18px;left:50%;width:1px;background:var(--line)}\n\n  /* ===== limit chips ===== */\n  .chips{display:flex;gap:9px;flex-wrap:wrap}\n  .chip{flex:1;min-width:60px;padding:14px 6px;border-radius:14px;background:var(--card);border:1.5px solid var(--line);\n    font-weight:800;font-size:19px;text-align:center;transition:.14s;color:var(--ink)}\n  .chip small{display:block;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--ink-soft);margin-top:2px;text-transform:uppercase}\n  .chip.on{background:var(--court);border-color:var(--court);color:#fff}\n  .chip.on small{color:rgba(255,255,255,.7)}\n\n  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:15px 18px}\n  .toggle-row .lbl{font-weight:600;font-size:14px}\n  .toggle-row .lbl small{display:block;font-size:11px;color:var(--ink-soft);font-weight:500;margin-top:2px}\n  .sw{width:48px;height:28px;border-radius:20px;background:var(--line);position:relative;transition:.18s;flex:none}\n  .sw.on{background:var(--court)}\n  .sw b{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}\n  .sw.on b{left:23px}\n\n  /* ===== big start ===== */\n  .start-btn{width:100%;margin-top:18px;padding:19px;border-radius:18px;background:var(--court);color:#fff;\n    font-size:17px;font-weight:800;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:10px;\n    box-shadow:0 10px 22px rgba(47,125,79,.32);transition:.15s}\n  .start-btn:active{transform:scale(.985)}\n  .start-btn:disabled{background:var(--line);color:var(--ink-soft);box-shadow:none}\n\n  /* ===== players manage ===== */\n  .plist{display:flex;flex-direction:column}\n  .prow{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}\n  .prow:last-child{border-bottom:none}\n  .pdot{width:38px;height:38px;border-radius:50%;background:var(--court);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex:none}\n  .prow .pi{flex:1;min-width:0}\n  .prow .pi b{font-size:15px;font-weight:700;display:block}\n  .prow .pi span{font-size:11.5px;color:var(--ink-soft)}\n  .prow .del{color:var(--ink-soft);font-size:18px;padding:6px;border-radius:8px}\n  .addp{display:flex;gap:9px;padding:13px 14px}\n  .addp input{flex:1;padding:13px 15px;border-radius:13px;border:1.5px solid var(--line);font-size:15px;font-family:inherit;background:var(--paper);color:var(--ink)}\n  .addp input:focus{outline:none;border-color:var(--court)}\n  .addp button{padding:0 20px;border-radius:13px;background:var(--ball);color:var(--ink);font-weight:800;font-size:22px}\n  .addp button:disabled{background:var(--line);color:var(--ink-soft)}\n  .empty-note{padding:26px 18px;text-align:center;color:var(--ink-soft);font-size:13.5px;line-height:1.5}\n\n  /* ===== bottom nav ===== */\n  .nav{position:absolute;bottom:0;left:0;right:0;height:74px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);\n    border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)}\n  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--ink-soft);font-size:10.5px;font-weight:700;letter-spacing:.3px}\n  .nav button.on{color:var(--court)}\n  .nav button svg{width:23px;height:23px}\n\n  /* ===== GAME SCREEN ===== */\n  .game{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--paper);z-index:30}\n  .game-head{display:flex;align-items:center;justify-content:space-between;padding:20px 18px 6px}\n  .game-head .x{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--ink-soft)}\n  .game-head .meta{text-align:center}\n  .game-head .meta b{font-size:13px;font-weight:800;letter-spacing:.5px}\n  .game-head .meta span{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:600;letter-spacing:1px;text-transform:uppercase}\n  .undo{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink)}\n  .undo:disabled{opacity:.32}\n\n  .courts{flex:1;display:flex;flex-direction:column;gap:10px;padding:10px 14px 14px}\n  .side{flex:1;border-radius:24px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;\n    color:#fff;overflow:hidden;transition:.1s;user-select:none}\n  .side:active{filter:brightness(1.06)}\n  .side.s1{background:linear-gradient(160deg,#2f6fd6,#1f4fa8)}\n  .side.s2{background:linear-gradient(160deg,#ef7038,#c84e1c)}\n  .side .nm{font-size:15px;font-weight:700;letter-spacing:.3px;opacity:.92;display:flex;align-items:center;gap:8px;z-index:2}\n  .side .serve{width:9px;height:9px;border-radius:50%;background:var(--ball);box-shadow:0 0 0 3px rgba(214,242,75,.3)}\n  .side .sc{font-size:120px;font-weight:900;line-height:.9;letter-spacing:-4px;z-index:2}\n  .side .tap{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.6;z-index:2;margin-top:6px}\n  .side .ghost{position:absolute;font-size:280px;font-weight:900;opacity:.07;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1}\n  .pts-tag{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;letter-spacing:1.5px;\n    background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;z-index:2}\n\n  /* win overlay */\n  .win{position:absolute;inset:0;z-index:40;background:rgba(22,36,27,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:30px}\n  .win .box{background:var(--card);border-radius:26px;padding:30px 26px;text-align:center;width:100%;box-shadow:0 30px 60px rgba(0,0,0,.3)}\n  .win .trophy{font-size:46px;margin-bottom:6px}\n  .win .who{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}\n  .win .lbl{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--court);margin-bottom:18px}\n  .win .fin{display:flex;align-items:center;justify-content:center;gap:18px;font-size:40px;font-weight:900;margin-bottom:24px}\n  .win .fin .c1{color:var(--p1)}.win .fin .c2{color:var(--p2)}\n  .win .fin em{font-size:18px;color:var(--ink-soft);font-style:normal}\n  .win .acts{display:flex;flex-direction:column;gap:10px}\n  .win .acts button{padding:16px;border-radius:15px;font-weight:800;font-size:15px}\n  .win .primary{background:var(--court);color:#fff}\n  .win .ghostb{background:var(--paper);color:var(--ink);border:1px solid var(--line)}\n\n  /* ===== STATS ===== */\n  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:4px;gap:3px;margin:4px 0 4px}\n  .seg button{flex:1;padding:9px 4px;border-radius:10px;font-size:12.5px;font-weight:700;color:var(--ink-soft);transition:.12s}\n  .seg button.on{background:var(--court);color:#fff}\n  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:6px}\n  .kpi{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 16px;box-shadow:var(--shadow)}\n  .kpi .v{font-size:30px;font-weight:900;letter-spacing:-1px;line-height:1}\n  .kpi .k{font-size:11px;font-weight:600;color:var(--ink-soft);margin-top:5px;letter-spacing:.3px}\n  .lead-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}\n  .lead-row:last-child{border-bottom:none}\n  .lead-row .rk{width:22px;font-weight:900;color:var(--ink-soft);font-size:14px;text-align:center}\n  .lead-row .nm{flex:1;min-width:0}\n  .lead-row .nm b{font-size:15px;font-weight:700;display:block}\n  .lead-row .bar{height:6px;border-radius:4px;background:var(--line);margin-top:6px;overflow:hidden}\n  .lead-row .bar i{display:block;height:100%;background:var(--court);border-radius:4px}\n  .lead-row .wl{text-align:right;font-weight:800;font-size:14px;flex:none}\n  .lead-row .wl span{color:var(--ink-soft);font-weight:600;font-size:11px}\n  .gl-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}\n  .gl-row:last-child{border-bottom:none}\n  .gl-row .t{font-size:11px;color:var(--ink-soft);width:46px;font-weight:600;flex:none}\n  .gl-row .nm{flex:1;font-size:13.5px;font-weight:600;min-width:0;line-height:1.3}\n  .gl-row .nm b{font-weight:800}\n  .gl-row .sc{font-weight:900;font-size:15px;letter-spacing:-.5px;flex:none}\n  .gl-row .sc .a{color:var(--p1)}.gl-row .sc .b{color:var(--p2)}\n\n  .fade-enter-active,.fade-leave-active{transition:opacity .18s}\n  .fade-enter-from,.fade-leave-to{opacity:0}\n  .pop-enter-active{animation:pop .22s cubic-bezier(.2,1.3,.4,1)}\n  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}\n  .bump{animation:bump .25s}\n  @keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.14)}100%{transform:scale(1)}}\n\n  /* sheet for picking player */\n  .sheet-bg{position:absolute;inset:0;background:rgba(22,36,27,.4);z-index:50;display:flex;align-items:flex-end}\n  .sheet{background:var(--card);width:100%;border-radius:26px 26px 0 0;padding:10px 0 calc(20px + env(safe-area-inset-bottom));max-height:74%;display:flex;flex-direction:column;animation:up .24s cubic-bezier(.2,1,.3,1)}\n  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}\n  .sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 6px}\n  .sheet h3{font-size:16px;font-weight:800;padding:8px 22px 10px}\n  .sheet .list{overflow-y:auto;padding:0 12px}\n  .sheet .opt{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:14px}\n  .sheet .opt:active{background:var(--paper)}\n  .sheet .opt.dis{opacity:.35}\n  .sheet .opt .pdot{background:var(--ink)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"app\">\n\n  <!-- ============ HOME ============ -->\n  <template v-if=\"view==='home'\">\n    <div class=\"topbar\">\n      <div class=\"brand\">\n        <div class=\"ball\"><\u002Fdiv>\n        <h1>Сетбол<span>Счёт матча<\u002Fspan><\u002Fh1>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"screen\">\n      <div class=\"sec-label\">Новый матч<\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"vs-wrap\">\n          <button class=\"pick p1\" @click=\"openPicker(1)\">\n            <div class=\"role\">Игрок 1<\u002Fdiv>\n            <div class=\"avatar\" :class=\"{empty:!p1}\">{{ p1 ? initials(p1.name) : '+' }}<\u002Fdiv>\n            <div class=\"pname\" :class=\"{ph:!p1}\">{{ p1 ? p1.name : 'Выбрать' }}<\u002Fdiv>\n            <div class=\"chev\">▾ сменить<\u002Fdiv>\n          <\u002Fbutton>\n          <div class=\"vs-badge\">VS<\u002Fdiv>\n          <button class=\"pick p2\" @click=\"openPicker(2)\">\n            <div class=\"role\">Игрок 2<\u002Fdiv>\n            <div class=\"avatar\" :class=\"{empty:!p2}\">{{ p2 ? initials(p2.name) : '+' }}<\u002Fdiv>\n            <div class=\"pname\" :class=\"{ph:!p2}\">{{ p2 ? p2.name : 'Выбрать' }}<\u002Fdiv>\n            <div class=\"chev\">▾ сменить<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"sec-label\">Играем до<\u002Fdiv>\n      <div class=\"chips\">\n        <button v-for=\"n in limitOptions\" :key=\"n\" class=\"chip\" :class=\"{on:limit===n}\" @click=\"limit=n\">\n          {{ n }}<small>очков<\u002Fsmall>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"margin-top:11px\">\n        <div class=\"toggle-row\" @click=\"winByTwo=!winByTwo\">\n          <div class=\"lbl\">Победа с разницей в 2<small>как в большом теннисе (дьюс)<\u002Fsmall><\u002Fdiv>\n          <div class=\"sw\" :class=\"{on:winByTwo}\"><b><\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button class=\"start-btn\" :disabled=\"!canStart\" @click=\"startGame\">\n        🎾 Начать матч\n      <\u002Fbutton>\n\n      <div class=\"sec-label\">Игроки<\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"addp\">\n          <input v-model=\"newName\" placeholder=\"Имя нового игрока\" maxlength=\"18\" @keyup.enter=\"addPlayer\">\n          <button :disabled=\"!newName.trim()\" @click=\"addPlayer\">+<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"plist\" v-if=\"players.length\">\n          <div class=\"prow\" v-for=\"p in playersSorted\" :key=\"p.id\">\n            <div class=\"pdot\">{{ initials(p.name) }}<\u002Fdiv>\n            <div class=\"pi\"><b>{{ p.name }}<\u002Fb><span>{{ playerLine(p.id) }}<\u002Fspan><\u002Fdiv>\n            <button class=\"del\" @click=\"removePlayer(p.id)\">✕<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"empty-note\" v-else=\"\">Пока нет игроков.<br>Добавьте первого, чтобы начать.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ftemplate>\n\n  <!-- ============ STATS ============ -->\n  <template v-if=\"view==='stats'\">\n    <div class=\"topbar\">\n      <div class=\"brand\">\n        <div class=\"ball\"><\u002Fdiv>\n        <h1>Статистика<span>{{ rangeLabel }}<\u002Fspan><\u002Fh1>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"screen\">\n      <div class=\"seg\">\n        <button v-for=\"r in ranges\" :key=\"r.k\" :class=\"{on:range===r.k}\" @click=\"range=r.k\">{{ r.label }}<\u002Fbutton>\n      <\u002Fdiv>\n\n      <template v-if=\"rangeGames.length\">\n        <div class=\"stat-grid\">\n          <div class=\"kpi\"><div class=\"v tnum\">{{ rangeGames.length }}<\u002Fdiv><div class=\"k\">Сыграно матчей<\u002Fdiv><\u002Fdiv>\n          <div class=\"kpi\"><div class=\"v tnum\">{{ totalPoints }}<\u002Fdiv><div class=\"k\">Очков набрано<\u002Fdiv><\u002Fdiv>\n          <div class=\"kpi\"><div class=\"v tnum\">{{ topName }}<\u002Fdiv><div class=\"k\">Лидер по победам<\u002Fdiv><\u002Fdiv>\n          <div class=\"kpi\"><div class=\"v tnum\">{{ avgPoints }}<\u002Fdiv><div class=\"k\">Очков за матч<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"sec-label\">Таблица<\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"lead-row\" v-for=\"(s,i) in standings\" :key=\"s.id\">\n            <div class=\"rk\">{{ i+1 }}<\u002Fdiv>\n            <div class=\"nm\">\n              <b>{{ s.name }}<\u002Fb>\n              <div class=\"bar\"><i :style=\"{width:s.rate+'%'}\"><\u002Fi><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wl\">{{ s.w }}<span>/{{ s.played }}<\u002Fspan><br><span>{{ s.rate }}% побед<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"sec-label\">Матчи<\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"gl-row\" v-for=\"g in rangeGamesDesc\" :key=\"g.id\">\n            <div class=\"t\">{{ fmtTime(g.endedAt) }}<\u002Fdiv>\n            <div class=\"nm\">\n              <b :style=\"{color: g.winnerId===g.p1Id ? 'var(--p1)':'inherit'}\">{{ g.p1Name }}<\u002Fb>\n              <span style=\"color:var(--ink-soft)\"> — <\u002Fspan>\n              <b :style=\"{color: g.winnerId===g.p2Id ? 'var(--p2)':'inherit'}\">{{ g.p2Name }}<\u002Fb>\n            <\u002Fdiv>\n            <div class=\"sc tnum\"><span class=\"a\">{{ g.score1 }}<\u002Fspan><span style=\"color:var(--ink-soft)\">:<\u002Fspan><span class=\"b\">{{ g.score2 }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Ftemplate>\n      <div class=\"card\" v-else=\"\" style=\"margin-top:14px\">\n        <div class=\"empty-note\">За этот период матчей нет.<br>Сыграйте партию — и она появится здесь.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ftemplate>\n\n  <!-- ============ NAV ============ -->\n  <div class=\"nav\" v-if=\"view!=='game'\">\n    <button :class=\"{on:view==='home'}\" @click=\"view='home'\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M4 7c5 4 11 4 16 0M4 17c5-4 11-4 16 0\"><\u002Fpath><\u002Fsvg>\n      Матч\n    <\u002Fbutton>\n    <button :class=\"{on:view==='stats'}\" @click=\"view='stats'\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 20V10M10 20V4M16 20v-7M22 20H2\"><\u002Fpath><\u002Fsvg>\n      Статистика\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ============ GAME ============ -->\n  <transition name=\"fade\">\n  <div class=\"game\" v-if=\"view==='game' &amp;&amp; active\">\n    <div class=\"game-head\">\n      <button class=\"x\" @click=\"confirmQuit\">✕<\u002Fbutton>\n      <div class=\"meta\">\n        <b>ДО {{ active.limit }}{{ active.winByTwo ? ' · РАЗНИЦА 2' : '' }}<\u002Fb>\n        <span>Матч идёт<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"undo\" :disabled=\"!active.history.length\" @click=\"undo\">\n        <svg viewBox=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 14L4 9l5-5\"><\u002Fpath><path d=\"M4 9h11a5 5 0 0 1 0 10H9\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"courts\">\n      <div class=\"side s1\" @click=\"addPoint(1)\">\n        <div class=\"pts-tag\">{{ active.p1Name }}<\u002Fdiv>\n        <div class=\"ghost\">{{ active.score1 }}<\u002Fdiv>\n        <div class=\"nm\"><span class=\"serve\" v-if=\"serve===1\"><\u002Fspan>{{ active.p1Name }}<\u002Fdiv>\n        <div class=\"sc tnum\" :class=\"{bump:bump===1}\" :key=\"'a'+active.score1\">{{ active.score1 }}<\u002Fdiv>\n        <div class=\"tap\">Нажми · +1 очко<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"side s2\" @click=\"addPoint(2)\">\n        <div class=\"pts-tag\">{{ active.p2Name }}<\u002Fdiv>\n        <div class=\"ghost\">{{ active.score2 }}<\u002Fdiv>\n        <div class=\"nm\"><span class=\"serve\" v-if=\"serve===2\"><\u002Fspan>{{ active.p2Name }}<\u002Fdiv>\n        <div class=\"sc tnum\" :class=\"{bump:bump===2}\" :key=\"'b'+active.score2\">{{ active.score2 }}<\u002Fdiv>\n        <div class=\"tap\">Нажми · +1 очко<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <transition name=\"pop\">\n    <div class=\"win\" v-if=\"winnerSide\">\n      <div class=\"box\">\n        <div class=\"trophy\">🏆<\u002Fdiv>\n        <div class=\"who\">{{ winnerSide===1 ? active.p1Name : active.p2Name }}<\u002Fdiv>\n        <div class=\"lbl\">Победитель<\u002Fdiv>\n        <div class=\"fin tnum\">\n          <span class=\"c1\">{{ active.score1 }}<\u002Fspan><em>:<\u002Fem><span class=\"c2\">{{ active.score2 }}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"acts\">\n          <button class=\"primary\" @click=\"finishGame\">Сохранить результат<\u002Fbutton>\n          <button class=\"ghostb\" @click=\"undo\">Отменить очко<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Ftransition>\n  <\u002Fdiv>\n  <\u002Ftransition>\n\n  <!-- ============ PICKER SHEET ============ -->\n  <transition name=\"fade\">\n  <div class=\"sheet-bg\" v-if=\"picker\" @click.self=\"picker=0\">\n    <div class=\"sheet\">\n      <div class=\"grab\"><\u002Fdiv>\n      <h3>Кто играет {{ picker===1 ? 'слева' : 'справа' }}?<\u002Fh3>\n      <div class=\"list\">\n        <div class=\"empty-note\" v-if=\"!players.length\">Сначала добавьте игроков на экране «Матч».<\u002Fdiv>\n        <div class=\"opt\" v-for=\"p in playersSorted\" :key=\"p.id\" :class=\"{dis: isTaken(p.id)}\" @click=\"choose(p)\">\n          <div class=\"pdot\" :style=\"{background: picker===1 ? 'var(--p1)':'var(--p2)'}\">{{ initials(p.name) }}<\u002Fdiv>\n          <div class=\"pi\" style=\"flex:1\"><b style=\"font-size:15px;font-weight:700\">{{ p.name }}<\u002Fb><\u002Fdiv>\n          <span v-if=\"isTaken(p.id)\" style=\"font-size:11px;color:var(--ink-soft);font-weight:600\">уже выбран<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Ftransition>\n\n<\u002Fdiv>\n\n<script>\nconst { createApp } = Vue;\nconst LS = {\n  get(k,d){ try{ return JSON.parse(localStorage.getItem(k)) ?? d }catch(e){ return d } },\n  set(k,v){ localStorage.setItem(k, JSON.stringify(v)) }\n};\nconst uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);\n\ncreateApp({\n  data(){\n    return {\n      view:'home',\n      players: LS.get('tn_players', []),\n      games: LS.get('tn_games', []),\n      active: LS.get('tn_active', null),\n      p1id: LS.get('tn_p1', null),\n      p2id: LS.get('tn_p2', null),\n      limit: LS.get('tn_limit', 11),\n      winByTwo: LS.get('tn_w2', false),\n      limitOptions:[7,11,15,21],\n      newName:'',\n      picker:0,\n      bump:0,\n      range:'today',\n      ranges:[\n        {k:'today',label:'Сегодня'},\n        {k:'week',label:'7 дней'},\n        {k:'month',label:'30 дней'},\n        {k:'all',label:'Всё время'},\n      ],\n    }\n  },\n  computed:{\n    p1(){ return this.players.find(p=>p.id===this.p1id) || null },\n    p2(){ return this.players.find(p=>p.id===this.p2id) || null },\n    playersSorted(){ return [...this.players].sort((a,b)=>a.name.localeCompare(b.name,'ru')) },\n    canStart(){ return this.p1 && this.p2 && this.p1id!==this.p2id },\n    serve(){\n      if(!this.active) return 0;\n      const total = this.active.score1 + this.active.score2;\n      const block = this.active.limit >= 15 ? 5 : 2; // смена подачи\n      return (Math.floor(total/block) % 2 === 0) ? 1 : 2;\n    },\n    winnerSide(){\n      const a=this.active; if(!a) return 0;\n      const need=a.limit, by=a.winByTwo?2:1;\n      if(a.score1>=need && a.score1-a.score2>=by) return 1;\n      if(a.score2>=need && a.score2-a.score1>=by) return 2;\n      return 0;\n    },\n    // ---- stats ----\n    rangeStart(){\n      const d=new Date(); d.setHours(0,0,0,0);\n      if(this.range==='today') return d.getTime();\n      if(this.range==='week') return d.getTime()-6*864e5;\n      if(this.range==='month') return d.getTime()-29*864e5;\n      return 0;\n    },\n    rangeLabel(){ return this.ranges.find(r=>r.k===this.range).label },\n    rangeGames(){ return this.games.filter(g=>g.endedAt>=this.rangeStart) },\n    rangeGamesDesc(){ return [...this.rangeGames].sort((a,b)=>b.endedAt-a.endedAt) },\n    totalPoints(){ return this.rangeGames.reduce((s,g)=>s+g.score1+g.score2,0) },\n    avgPoints(){ return this.rangeGames.length ? Math.round(this.totalPoints/this.rangeGames.length) : 0 },\n    standings(){\n      const m={};\n      const add=(id,name)=>{ if(!m[id]) m[id]={id,name,w:0,played:0}; };\n      this.rangeGames.forEach(g=>{\n        add(g.p1Id,g.p1Name); add(g.p2Id,g.p2Name);\n        m[g.p1Id].played++; m[g.p2Id].played++;\n        m[g.winnerId].w++;\n      });\n      return Object.values(m).map(s=>({...s, rate: s.played?Math.round(s.w/s.played*100):0}))\n        .sort((a,b)=> b.w-a.w || b.rate-a.rate);\n    },\n    topName(){ return this.standings.length ? this.standings[0].name : '—' },\n  },\n  watch:{\n    players(v){ LS.set('tn_players',v) },\n    games(v){ LS.set('tn_games',v) },\n    active:{ deep:true, handler(v){ LS.set('tn_active',v) } },\n    p1id(v){ LS.set('tn_p1',v) },\n    p2id(v){ LS.set('tn_p2',v) },\n    limit(v){ LS.set('tn_limit',v) },\n    winByTwo(v){ LS.set('tn_w2',v) },\n  },\n  mounted(){\n    if(this.active) this.view='game';\n  },\n  methods:{\n    initials(n){ return (n||'?').trim().slice(0,2).toUpperCase() },\n    addPlayer(){\n      const name=this.newName.trim(); if(!name) return;\n      this.players.push({id:uid(), name, createdAt:Date.now()});\n      this.newName='';\n    },\n    removePlayer(id){\n      if(!confirm('Удалить игрока? Сыгранные матчи останутся в истории.')) return;\n      this.players=this.players.filter(p=>p.id!==id);\n      if(this.p1id===id) this.p1id=null;\n      if(this.p2id===id) this.p2id=null;\n    },\n    playerLine(id){\n      const gs=this.games.filter(g=>g.p1Id===id||g.p2Id===id);\n      if(!gs.length) return 'нет матчей';\n      const w=gs.filter(g=>g.winnerId===id).length;\n      return `${gs.length} матч.· ${w} побед`;\n    },\n    openPicker(slot){ this.picker=slot },\n    isTaken(id){ return (this.picker===1 && this.p2id===id) || (this.picker===2 && this.p1id===id) },\n    choose(p){\n      if(this.isTaken(p.id)) return;\n      if(this.picker===1) this.p1id=p.id; else this.p2id=p.id;\n      this.picker=0;\n    },\n    startGame(){\n      if(!this.canStart) return;\n      this.active={\n        id:uid(),\n        p1Id:this.p1id, p2Id:this.p2id,\n        p1Name:this.p1.name, p2Name:this.p2.name,\n        limit:this.limit, winByTwo:this.winByTwo,\n        score1:0, score2:0, history:[],\n        startedAt:Date.now(),\n      };\n      this.view='game';\n    },\n    addPoint(side){\n      const a=this.active; if(!a || this.winnerSide) return;\n      a.history.push(side);\n      if(side===1) a.score1++; else a.score2++;\n      this.bump=side;\n      if(navigator.vibrate) navigator.vibrate(12);\n      setTimeout(()=>{ this.bump=0 },250);\n    },\n    undo(){\n      const a=this.active; if(!a || !a.history.length) return;\n      const last=a.history.pop();\n      if(last===1) a.score1=Math.max(0,a.score1-1); else a.score2=Math.max(0,a.score2-1);\n    },\n    finishGame(){\n      const a=this.active; if(!a) return;\n      this.games.push({\n        id:a.id, p1Id:a.p1Id, p2Id:a.p2Id, p1Name:a.p1Name, p2Name:a.p2Name,\n        limit:a.limit, score1:a.score1, score2:a.score2,\n        winnerId: this.winnerSide===1 ? a.p1Id : a.p2Id,\n        startedAt:a.startedAt, endedAt:Date.now(),\n      });\n      this.active=null; LS.set('tn_active',null);\n      this.range='today';\n      this.view='stats';\n    },\n    confirmQuit(){\n      if(confirm('Завершить матч без сохранения?')){\n        this.active=null; LS.set('tn_active',null);\n        this.view='home';\n      }\n    },\n    fmtTime(ts){\n      const d=new Date(ts);\n      return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});\n    },\n  }\n}).mount('#app');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
